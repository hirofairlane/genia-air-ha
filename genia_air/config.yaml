name: Vaillant Genia Air
version: "0.2.1"
slug: genia_air
description: Standalone control & optimization for Vaillant Genia Air — bundled ebusd daemon, dashboard, history
url: https://github.com/hirofairlane/genia-air-ha
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
startup: services
boot: auto
init: false
hassio_api: true
homeassistant_api: true
services:
  - mqtt:need
ingress: true
ingress_port: 8099
panel_icon: mdi:heat-pump
panel_title: Genia Air
panel_admin: false
map:
  - share:rw
options:
  ebus_device: "ens:192.168.1.171:9999"
  topic_prefix: ebusd
  zone_count: 1
  optimize_flow_temp: true
  target_delta_t: 5.0
  min_flow_temp_safe: 14.0
  max_flow_temp_safe: 35.0
  summer_temp_limit: 19.0
  optimize_cycle_minutes: 5
  ebusd_log_level: "notice"
  log_level: info
schema:
  ebus_device: str
  topic_prefix: str
  zone_count: int(1,3)
  optimize_flow_temp: bool
  target_delta_t: float(2.0,10.0)
  min_flow_temp_safe: float(10.0,20.0)
  max_flow_temp_safe: float(25.0,55.0)
  summer_temp_limit: float(15.0,25.0)
  optimize_cycle_minutes: int(1,60)
  ebusd_log_level: list(error|notice|info|debug)
  log_level: list(debug|info|warning|error)
